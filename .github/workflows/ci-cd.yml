name: SmartDocs CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # -------------------------------
  # 1️⃣ Build & Test
  # -------------------------------
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install --legacy-peer-deps

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: npm test || echo "No tests found"


  # -------------------------------
  # 2️⃣ SonarCloud Analysis (NON-BLOCKING)
  # -------------------------------
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=SmartDocs
            -Dsonar.organization=kashyapojha
            -Dsonar.sources=frontend,backend
            -Dsonar.exclusions=**/node_modules/**,**/logs/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Quality Gate Check (Non-blocking)
        if: always()
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  # -------------------------------
  # 3️⃣ Docker Build & Push
  # -------------------------------
  docker-build-and-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: sonarcloud

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Frontend
        run: |
          docker build \
            --build-arg REACT_APP_API_URL=http://3.111.204.191:5000 \
            -t karann24/smartdocs-frontend:latest ./frontend
          docker push karann24/smartdocs-frontend:latest

      - name: Build & Push Backend
        run: |
          docker build -t karann24/smartdocs-backend:latest ./backend
          docker push karann24/smartdocs-backend:latest


  # -------------------------------
  # 4️⃣ Deploy to EC2
  # -------------------------------
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker-build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_KEY }}
          script: |
            set -e
            echo "🚀 Starting deployment..."

            cd /home/ubuntu/smart-docs/SmartDocs

            echo "📥 Syncing latest code"
            git fetch origin
            git reset --hard origin/main

            echo "🐳 Pulling latest Docker images"
            docker pull karann24/smartdocs-frontend:latest
            docker pull karann24/smartdocs-backend:latest

            echo "🛑 Stopping old containers"
            docker compose down

            echo "▶️ Starting new containers"
            docker compose up -d --remove-orphans

            echo "🧹 Cleaning unused images"
            docker image prune -f

            echo "✅ Deployment complete!"