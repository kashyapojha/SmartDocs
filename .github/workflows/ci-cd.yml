name: SmartDocs CI/CD

# Trigger the workflow on push or PR to develop/main
on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:

  # -------------------------------
  # 1️⃣ Build and test frontend/backend
  # -------------------------------
  build-and-test:
    name: Build & Test Frontend/Backend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend]   # Run both frontend & backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install --legacy-peer-deps

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: npm test || exit 0   # Prevent workflow failure if tests fail

  # -------------------------------
  # 2️⃣ Build & push Docker images
  # -------------------------------
  docker-build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ---- Docker Hub login ----
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}  # Docker Hub username
          password: ${{ secrets.DOCKER_PASSWORD }}  # Docker Hub password or PAT
          registry: docker.io                       # Always Docker Hub
          ecr: false                                # Disable AWS ECR login
          logout: true                              # Logout after workflow

      # ---- Build & push frontend ----
      - name: Build & Push Frontend Docker Image
        run: |
          docker build -t karann24/smartdocs-frontend:latest ./frontend
          docker push karann24/smartdocs-frontend:latest

      # ---- Build & push backend ----
      - name: Build & Push Backend Docker Image
        run: |
          docker build -t karann24/smartdocs-backend:latest ./backend
          docker push karann24/smartdocs-backend:latest

  # -------------------------------
  # 3️⃣ Deploy to staging server via SSH
  # -------------------------------
  deploy-staging:
    name: Deploy to Staging Server
    runs-on: ubuntu-latest
    needs: docker-build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_KEY }}
          script: |
            docker pull karann24/smartdocs-frontend:latest
            docker pull karann24/smartdocs-backend:latest
            docker-compose -f /home/ubuntu/SmartDocs/docker-compose.yml down
            docker-compose -f /home/ubuntu/SmartDocs/docker-compose.yml up -d