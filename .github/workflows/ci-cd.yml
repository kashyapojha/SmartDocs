name: SmartDocs CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:

  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: npm test

  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker images
        run: |
          docker build -t karann24/smartdocs-frontend:latest ./frontend
          docker build -t karann24/smartdocs-backend:latest ./backend

      - name: Push Docker images
        run: |
          docker push karann24/smartdocs-frontend:latest
          docker push karann24/smartdocs-backend:latest

  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build-and-push

    steps:
      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_KEY }}
          script: |
            docker pull karann24/smartdocs-frontend:latest
            docker pull karann24/smartdocs-backend:latest
            docker-compose -f /home/ubuntu/SmartDocs/docker-compose.yml down
            docker-compose -f /home/ubuntu/SmartDocs/docker-compose.yml up -d