version: '3.9'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7-alpine
    container_name: smartdocs-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: smartdocs
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - smartdocs-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartdocs-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      
      # Database Connection
      MONGO_URI: mongodb://mongodb:27017/smartdocs
      
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRE: 7d
      REFRESH_TOKEN_EXPIRE: 30d
      
      # Client URL for CORS
      CLIENT_URL: http://localhost:3000
      
    depends_on:
      mongodb:
        condition: service_healthy
    
    volumes:
      # Persist logs (optional)
      - ./backend/logs:/app/logs
    
    networks:
      - smartdocs-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass build arguments if using build stage
        REACT_APP_API_URL: http://backend:5000
    
    container_name: smartdocs-frontend
    ports:
      - "3000:3000"
    
    environment:
      # React App Configuration
      # In Docker, use service name instead of localhost
      REACT_APP_API_URL: http://backend:5000
      REACT_APP_ENV: production
      REACT_APP_DEBUG: "false"
      
      # Node Environment
      NODE_ENV: production
    
    depends_on:
      backend:
        condition: service_healthy
    
    networks:
      - smartdocs-network
    
    # Optional: serve from HTTP only
    # For HTTPS, use reverse proxy (nginx, traefik, etc.)

  # Optional: Nginx Reverse Proxy for production setup
  # Uncomment to use this configuration
  # nginx:
  #   image: nginx:alpine
  #   container_name: smartdocs-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf
  #     - ./certs:/etc/nginx/certs  # For SSL certificates
  #   depends_on:
  #     - frontend
  #     - backend
  #   networks:
  #     - smartdocs-network

# Named volumes for data persistence
volumes:
  mongo_data:
    driver: local

# Custom network for service communication
networks:
  smartdocs-network:
    driver: bridge

# Production Tips:
# 1. Don't commit .env values - use environment variables from CI/CD
# 2. Use strong JWT_SECRET in production
# 3. Set up proper CORS_ORIGIN for your domain
# 4. Use HTTPS with reverse proxy (nginx/traefik)
# 5. Enable healthchecks for monitoring
# 6. Use specific image versions, not 'latest'
# 7. Configure restart policies for production
# 8. Set resource limits (memory, CPU)
# 9. Use dedicated volumes for data persistence
# 10. Set up logging and monitoring

# Example environment variables for production:
# JWT_SECRET: <randomly-generated-long-string>
# CORS_ORIGIN: https://yourdomain.com,https://www.yourdomain.com
# MONGO_URI: mongodb+srv://user:password@cluster.mongodb.net/smartdocs
# NODE_ENV: production
# LOG_LEVEL: warn
# REACT_APP_ENV: production
