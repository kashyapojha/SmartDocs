version: '3.9'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: smartdocs-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: smartdocs
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - smartdocs-network

  # Backend API Server
  backend:
    image: karann24/smartdocs-backend
    container_name: smartdocs-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000

      # Database Connection
      MONGO_URI: mongodb://mongodb:27017/smartdocs

      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRE: 7d
      REFRESH_TOKEN_EXPIRE: 30d

      # Client URL for CORS
      CLIENT_URL: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      # Persist logs (optional)
      - ./backend/logs:/app/logs
    networks:
      - smartdocs-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React Application
  frontend:
    image: karann24/smartdocs-frontend
    container_name: smartdocs-frontend
    ports:
      - "3000:3000"
    environment:
      # React App Configuration
      REACT_APP_API_URL: http://backend:5000
      REACT_APP_ENV: production
      REACT_APP_DEBUG: "false"

      # Node Environment
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - smartdocs-network

# Named volumes for data persistence
volumes:
  mongo_data:
    driver: local

# Custom network for service communication
networks:
  smartdocs-network:
    driver: bridge