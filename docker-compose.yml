```yaml
name: SmartDocs CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-analyze-deploy:
    runs-on: ubuntu-latest

    steps:
    # -------------------------------
    # 1. Checkout Code
    # -------------------------------
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    # -------------------------------
    # 2. Setup Node.js
    # -------------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    # -------------------------------
    # 3. Install Backend Dependencies
    # -------------------------------
    - name: Install backend dependencies
      working-directory: backend
      run: npm install

    # -------------------------------
    # 4. Install Frontend Dependencies
    # -------------------------------
    - name: Install frontend dependencies
      working-directory: frontend
      run: npm install

    # -------------------------------
    # 5. SonarCloud Scan
    # -------------------------------
    - name: SonarCloud Scan
      uses: sonarsource/sonarcloud-github-action@v2
      with:
        args: >
          -Dsonar.projectKey=SmartDocs
          -Dsonar.organization=kashyapojha
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # -------------------------------
    # 6. Quality Gate Check (CORRECT)
    # -------------------------------
    - name: SonarCloud Quality Gate
      uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # -------------------------------
    # 7. Docker Login
    # -------------------------------
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # -------------------------------
    # 8. Build & Push Backend Image
    # -------------------------------
    - name: Build & Push Backend
      run: |
        docker build -t karann24/smartdocs-backend ./backend
        docker push karann24/smartdocs-backend

    # -------------------------------
    # 9. Build & Push Frontend Image
    # -------------------------------
    - name: Build & Push Frontend
      run: |
        docker build -t karann24/smartdocs-frontend ./frontend
        docker push karann24/smartdocs-frontend

    # -------------------------------
    # 10. Deploy to EC2
    # -------------------------------
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.9
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_KEY }}
        script: |
          echo "🚀 Starting deployment..."

          cd ~/smart-docs || git clone https://github.com/${{ github.repository }} ~/smart-docs
          cd ~/smart-docs

          git pull origin main

          docker pull karann24/smartdocs-backend:latest
          docker pull karann24/smartdocs-frontend:latest

          docker compose down
          docker compose up -d --remove-orphans

          echo "✅ Deployment completed!"
```
