version: '3.9'

services:

  # -------------------------------
  # MongoDB Database
  # -------------------------------
  mongodb:
    image: mongo:7
    container_name: smartdocs-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: smartdocs
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - smartdocs-network


  # -------------------------------
  # Backend API Server
  # -------------------------------
  backend:
    image: karann24/smartdocs-backend:latest
    container_name: smartdocs-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/smartdocs
      CLIENT_URL: http://3.111.204.191:3000   # 👈 FIXED (was localhost)
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    restart: unless-stopped
    networks:
      - smartdocs-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


  # -------------------------------
  # Frontend React Application
  # -------------------------------
  frontend:
    image: karann24/smartdocs-frontend:latest
    container_name: smartdocs-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://3.111.204.191:5000   # 👈 FIXED
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - smartdocs-network


  # -------------------------------
  # SonarQube (Production Setup)
  # -------------------------------
  sonarqube:
    image: sonarqube:lts
    container_name: sonarqube
    depends_on:
      - sonardb
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonardb:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    restart: unless-stopped
    networks:
      - smartdocs-network


  # -------------------------------
  # SonarQube Database (PostgreSQL)
  # -------------------------------
  sonardb:
    image: postgres:13
    container_name: sonarqube-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonardb_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - smartdocs-network


# -------------------------------
# Volumes
# -------------------------------
volumes:
  mongo_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonardb_data:


# -------------------------------
# Network
# -------------------------------
networks:
  smartdocs-network:
    driver: bridge